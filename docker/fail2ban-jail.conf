# Fail2ban jail template (defaults below). Production containers rewrite
# /etc/fail2ban/jail.d/aviationwx.conf at start from config.network_ports.

[DEFAULT]
# Ban policy for camera uploads: Forgiving to allow configuration mistakes
# 10 failures in 1 hour = 1 hour ban (quick recovery for legitimate cameras)
bantime = 3600
findtime = 3600
maxretry = 10
backend = auto
destemail = root@localhost
sendername = Fail2Ban
action = %(action_)s

# vsftpd jail (defaults: FTP control + explicit TLS; match config.network_ports)
# Forgiving for camera misconfigurations while still preventing brute force
[vsftpd]
enabled = true
port = 2121,2122
filter = vsftpd
logpath = /var/log/vsftpd.log
maxretry = 10
findtime = 3600
bantime = 3600
action = iptables-multiport[name=VSFTPD, port="2121,2122", protocol=tcp]

# sshd-sftp jail (default SFTP port; match config.network_ports.sftp)
# Forgiving for camera misconfigurations while still preventing brute force
[sshd-sftp]
enabled = true
port = 2222
filter = sshd-sftp
logpath = /var/log/auth.log
maxretry = 10
findtime = 3600
bantime = 3600
action = iptables-multiport[name=SSHD-SFTP, port="2222", protocol=tcp]

