# Main Nginx configuration file
# This file defines the log_format in the http context
# Mount this as /etc/nginx/nginx.conf to enable JSON access logging

user nginx;
worker_processes auto;
error_log /dev/stderr warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # CORS allowlist for Public API (M2M): *.aviationwx.org and localhost
    # When Origin matches, echo it back; otherwise no Access-Control-Allow-Origin (blocks cross-origin)
    map $http_origin $cors_allow_origin {
        default "";
        "~^https://(aviationwx\.org|([a-z0-9-]+\.)?aviationwx\.org)$" $http_origin;
        "~^http://localhost(:[0-9]+)?$" $http_origin;
        "~^http://127\.0\.0\.1(:[0-9]+)?$" $http_origin;
    }

    # JSON log format for access logs
    log_format json_access escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"request":"$request",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"http_x_forwarded_for":"$http_x_forwarded_for",'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time",'
            '"source":"nginx_access"'
        '}';

    # Note: The "combined" log_format is already defined by nginx by default,
    # so we don't need to redefine it here. It's available as a fallback.

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Proxy cache for map tiles (reduces OpenWeatherMap API usage)
    proxy_cache_path /var/cache/nginx/map_tiles
                     levels=1:2
                     keys_zone=map_tiles:10m
                     max_size=500m
                     inactive=7d
                     use_temp_path=off;

    # Cache headers for /public JS/CSS (locations in conf.d/default.conf).
    # Versioned URLs (?v=<build hash>) change on every deploy, so browsers
    # and the CDN can cache them long-term. Unversioned URLs keep the
    # conservative short-lived behavior (JS: no-store for aggressive refresh
    # on mobile Safari, CSS: 15 minutes). Empty map values omit the header.
    map $arg_v $public_js_cache_control {
        ""      "no-cache, no-store, must-revalidate";
        default "public, max-age=2592000, immutable";
    }
    map $arg_v $public_js_pragma {
        ""      "no-cache";
        default "";
    }
    map $arg_v $public_js_expires {
        ""      "0";
        default "";
    }
    map $arg_v $public_css_cache_control {
        ""      "public, max-age=900, must-revalidate";
        default "public, max-age=2592000, immutable";
    }

    # Include server configurations
    include /etc/nginx/conf.d/*.conf;
}

