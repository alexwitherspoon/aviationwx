# Fail2ban filter template for sshd (SFTP). Runtime filter is generated in docker-entrypoint.sh.
# auth.log "port N" is the client ephemeral port, not the server listen port.

[Definition]
failregex = ^.*Failed password for .* from <HOST> port [0-9]+.*$
            ^.*Invalid user .* from <HOST> port [0-9]+.*$
            ^.*Connection closed by authenticating user .* <HOST> port [0-9]+.*$
            ^.*Connection reset by authenticating user .* <HOST> port [0-9]+.*$

# Ignore successful logins
ignoreregex =

